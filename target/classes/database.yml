# Конфигурация базы данных
# Поддерживаемые типы: SQLITE, MYSQL

storage:
  type: SQLITE  # SQLITE или MYSQL

# Настройки MySQL (используются только если type: MYSQL)
mysql:
  host: "localhost"
  port: 3306
  database: "commandcooldown"
  username: "root"
  password: "password"
  useSSL: false
  
# Настройки SQLite (используются только если type: SQLITE)
sqlite:
  filename: "cooldowns.db"
